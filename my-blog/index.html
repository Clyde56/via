<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A personal blog built with pure static technology, deployed on Cloudflare Pages." />
  <meta name="keywords" content="blog, tech, programming, 博客, 技术" />
  <meta name="author" content="Author" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Open Graph -->
  <meta property="og:title" content="My Blog" />
  <meta property="og:description" content="A personal blog built with pure static technology, deployed on Cloudflare Pages." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://my-blog.pages.dev" />
  <meta property="og:locale" content="zh_CN" />
  <meta property="og:site_name" content="My Blog" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="My Blog" />
  <meta name="twitter:description" content="A personal blog built with pure static technology." />

  <!-- Canonical URL -->
  <link rel="canonical" href="https://my-blog.pages.dev" />

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="My Blog RSS Feed" href="/rss.xml" />

  <!-- Sitemap -->
  <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>" />

  <!-- Preconnect to CDNs -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />

  <!-- SEO: JSON-LD Structured Data -->
  <script type="application/ld+json" id="ld-person">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Author",
    "url": "https://my-blog.pages.dev"
  }
  </script>
  <script type="application/ld+json" id="ld-website">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "My Blog",
    "url": "https://my-blog.pages.dev"
  }
  </script>
  <script type="application/ld+json" id="ld-breadcrumb">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://my-blog.pages.dev" }
    ]
  }
  </script>

  <title>My Blog</title>

  <!-- Styles -->
  <link id="hljs-theme" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
  <link rel="stylesheet" href="/assets/css/style.css" />
</head>
<body>
  <!-- Header -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <a href="/" class="site-title" data-route aria-label="回到首页">My Blog</a>

      <nav class="header-nav" role="navigation" aria-label="主导航">
        <a href="/" class="nav-link" data-route>📄 <span>文章</span></a>
        <a href="/tags" class="nav-link" data-route>🏷️ <span>标签</span></a>
        <a href="/rss.xml" class="nav-link" target="_blank" rel="noopener">📡 <span>RSS</span></a>
        <a href="/admin.html" class="nav-link" title="管理后台">⚙️ <span>管理</span></a>
        <button id="theme-toggle" class="theme-btn" type="button" aria-label="切换主题">🌙</button>
      </nav>

      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main id="app" class="main-content" role="main">
    <div class="loading">
      <div class="spinner"></div>
      <span>加载中...</span>
    </div>
  </main>

  <!-- Footer -->
  <footer class="site-footer" role="contentinfo">
    <div class="container">
      <p>&copy; <span id="footer-year"></span> <a href="/" data-route>My Blog</a>. Powered by pure static tech on Cloudflare Pages.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    // Set current year in footer
    document.getElementById('footer-year').textContent = new Date().getFullYear();
  </script>
  <script src="/assets/js/theme.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
